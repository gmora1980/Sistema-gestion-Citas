<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <body>
        <nav th:fragment="navbar" class="navbar-custom">
            <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
                <a th:href="@{/}" class="navbar-brand" style="text-decoration: none;">SISTEMA DE CITAS HOSPITALARIO</a>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <a th:href="@{/usuario/perfil}" class="nav-link">Mi perfil</a>
                    <a th:href="@{/medico}" class="nav-link">Médicos</a>
                    <a sec:authorize="hasRole('ADMIN')"
                        th:href="@{/usuario/listaUsuarios}"
                        class="nav-link">Administrador</a>
                    <form th:action="@{/logout}" method="post" style="margin:0;">
                        <button type="submit" class="btn-logout">Cerrar Sesión</button>
                    </form>
                </div>
            </div>
        </nav>
    </body>
</html>
