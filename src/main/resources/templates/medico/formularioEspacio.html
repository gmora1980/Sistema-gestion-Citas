<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Espacio de Citas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="container-custom fade-in">
        <div class="page-header">
            <h1>Nuevo Espacio de Cita</h1>
            <p>Agenda la nueva cita para el médico</p>
        </div>
        <div class="card-custom">
            <div class="card-header-custom">
                Configuración de horario
            </div>
            <div class="card-body-custom">
                <form th:action="@{/medico/espacio/guardar}" th:object="${espacio}" method="post">
                    <input type="hidden" name="medicoId" th:value="${medicoId != null ? medicoId : 0}">
                    <div style="display: grid;grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:1.5rem;">
                        <div class="form-group">
                            <label class="form-label">Fecha</label>
                            <input type="date" th:field="*{fecha}" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Hora de Inicio</label>
                            <input type="time" th:field="*{horainicio}" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Hora de Fin</label>
                            <input type="time" th:field="*{horafin}" class="form-control" required>
                        </div>
                    </div>
                    <div class="alert alert-info mt-3">
                        Espacio se creará como <strong>disponible</strong>. Cuando un usuario reserve una cita, cambiara a ocupado.
                    </div>
                    <div class="flex-between mt-4">
                        <a th:href="@{/medico/{id}/espacios(id=${medicoId})}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Crear Espacio</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
