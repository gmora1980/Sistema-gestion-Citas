<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="container-custom fade-in">
        <div class="page-header flex-between">
            <div>
                <h1>Gestión de Usuarios</h1>
                <p>Administra todos los usuarios del sistema</p>
            </div>
            <a th:href="@{/medico}" class="btn btn-info">
                Ir a Médicos
            </a>
        </div>
        <div class="table-container" th:if="${usuarios != null and !#lists.isEmpty(usuarios)}">
            <table class="table-custom">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Cédula</th>
                        <th>Correo</th>
                        <th>Contacto</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.id}"></td>
                        <td><strong th:text="${usuario.nombre}"></strong></td>
                        <td th:text="${usuario.cedula}"></td>
                        <td th:text="${usuario.correo}"></td>
                        <td th:text="${usuario.contacto}"></td>
                        <td>
                            <span th:if="${usuario.rol == 'ADMIN'}" class="badge badge-danger">ADMIN</span>
                            <span th:unless="${usuario.rol=='ADMIN'}" class="badge badge-info">USUARIO</span>
                        </td>
                        <td>
                            <span th:if="${usuario.activo}" class="badge badge-success">Activo</span>
                            <span th:unless="${usuario.activo}" class="badge badge-danger">Inactivo</span>
                        </td>
                       <td>
                        <a th:href="@{/usuario/editar/{id}(id=${usuario.id})}" class="btn btn-warning btn-sm">Editar</a>
                        <a th:href="@{/usuario/desactivar/{id}(id=${usuario.id})}" class="btn btn-danger btn-sm" onclick="return confirm('¿Estás seguro de desactivar este usuario?')">Desactivar</a>
                       </td> 
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${usuarios==null or #lists.isEmpty(usuarios)}" class="alert alert-info mt-3">
            No hay usuarios registrados en el sistema
        </div>
    </div>
</body>
</html>
