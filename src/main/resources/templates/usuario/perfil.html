<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Sistema de Citas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container-custom fade-in">
        <div class="page-header">
            <h1>Mi Perfil</h1>
            <p>Actualiza tu información personal y contraseña</p>
        </div>

        <div class="card-custom" th:if="${usuario != null}">
            <div class="card-header-custom">
                Información Personal
            </div>

            <div class="card-body-custom">
                <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>
                <div th:if="${exito != null}" class="alert alert-success" th:text="${exito}"></div>

                <form th:action="@{/usuario/guardar}" th:object="${usuario}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{rol}">

                    <div
                        style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem;">
                        <div class="form-group">
                            <label class="form-label">Nombre Completo</label>
                            <input type="text" th:field="*{nombre}" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Cédula</label>
                            <input type="text" th:field="*{cedula}" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" th:field="*{correo}" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Teléfono de Contacto</label>
                            <input type="tel" th:field="*{contacto}" class="form-control">
                        </div>
                    </div>

                    <hr style="margin: 2rem 0; border: none; border-top: 2px solid var(--gray-200);">

                    <div class="form-group">
                        <label class="form-label">Nueva Contraseña (Dejar vacío para mantener la actual)</label>
                        <input type="password" name="nuevaPassword" class="form-control"
                            placeholder="Mínimo 6 caracteres" minlength="6">
                    </div>

                    <div class="flex-between mt-4">
                        <div>
                            <span class="badge badge-info" th:text="'Rol: ' + ${usuario.rol}"></span>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            Guardar Cambios
                        </button>
                    </div>
                </form>
                <div th:if="${usuario == null}" class="alert alert-danger">
                    Usuario no encontrado
                </div>
            </div>
        </div>
    </div>
</body>

</html>
