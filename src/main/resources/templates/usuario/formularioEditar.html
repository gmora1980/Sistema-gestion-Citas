<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuario - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="container-custom fade-in">
        <div class="page-header">
            <h1>Editar Usuario</h1>
            <p>Modifica la información del usuario seleccionado</p>
        </div>
        <div class="card-custom">
            <div class="card-header-custom" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
                Formulario de Edición para Administradores
            </div>
            <div class="card-body-custom">
                <div th:if="${error!=null}" class="alert alert-danger" th:text="${error}"></div>
                <form th:action="@{/usuario/admin/guardar}" th:object="${usuario}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <div
                        style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));gap: 1.5rem;">
                        <div class="form-group">
                            <label class="form-label">Nombre Completo *</label>
                            <input type="text" th:field="*{nombre}" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Cédula *</label>
                            <input type="text" th:field="*{cedula}" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Correo Electrónico *</label>
                            <input type="email" th:field="*{correo}" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Teléfono de Contacto</label>
                            <input type="tel" th:field="*{contacto}" class="form-control">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Rol del Usuario</label>
                            <select th:field="*{rol}" class="form-control select-custom">
                                <option value="USUARIO">USUARIO</option>
                                <option value="ADMIN">ADMIN</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex-between mt-4">
                        <a th:href="@{/usuario/listaUsuarios}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    </div>
                </form>
                <div th:if="${usuario == null}" class="alert alert-danger">
                    Usuario no encontrado
                </div>
            </div>
        </div>
    </div>
</body>

</html>
