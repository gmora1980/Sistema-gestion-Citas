<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card fade-in">
            <div class="auth-header" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
                <h2>Recuperar Contraseña</h2>
                <p>ingresa tu correo para verificar tu cuenta</p>
            </div>
            <div class="auth-body">
                <div th:if="${mensaje}" class="alert alert-info" th:text="${mensaje}"></div>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <p style="margin-bottom: 1.5rem; color: var(--gray-600);">
                    El sistema buscará su cuenta y le mostrará la información asociada para verificación
                </p>
                <form th:action="@{/recuperar}" method="post">
                    <div class="form-group">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" name="correo" class="form-control" placeholder="tu@ejemplo.com" required>
                    </div>
                    <button type="submit" class="btn btn-warning btn-block mt-3">
                        Verificar Cuenta
                    </button>
                </form>
            </div>
            <div class="auth-footer">
                <p><a th:href="@{/login}">Volver al inicio de sesión</a></p>
            </div>
        </div>
    </div>
</body>
</html>
