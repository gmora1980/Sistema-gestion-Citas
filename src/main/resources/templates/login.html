<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de citas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <h2>Bienvenido</h2>
                <p>Sistema de Gestión de Citas Hospitalarias</p>
            </div>
            <div class="auth-body">
                <div th:if="${param.error}" class="alert alert-danger">
                    Correo o contraseña incorrectos
                </div>
                <div th:if="${param.logout}" class="alert alert-success">
                    Ha cerrado sesión de forma exitosa
                </div>
                <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>
                <form th:action="@{/login}" method="post">
                    <div class="form-group">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" name="username" class="form-control" placeholder="ejemplo@hospital.com"
                            required autofocus>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" placeholder="******" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block mt-3">
                        Iniciar Sesión
                    </button>
                </form>
            </div>
            <div class="auth-footer">
                <p><a th:href="@{/registro}">¿No tienes cuenta? Regístrate aquí</a></p>
                <p class="mt-1"><a th:href="@{/recuperar}">¿Olvidaste tu contraseña?</a></p>
            </div>
        </div>
    </div>
</body>

</html>
